<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="270" fill="#0e0e0e" rx="8"/>
  <!-- Subtle scanline texture -->
  <line x1="0" y1="40" x2="480" y2="40" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="80" x2="480" y2="80" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="120" x2="480" y2="120" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="160" x2="480" y2="160" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="200" x2="480" y2="200" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="480" y2="240" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Era accent bar -->
  <rect x="0" y="263" width="480" height="3" fill="#15B5FF" rx="0" fill-opacity="0.6"/>
  <!-- Ghost year -->
  <text x="20" y="230" font-family="'IBM Plex Sans', sans-serif" font-size="128" font-weight="700"
        fill="#15B5FF" fill-opacity="0.05" letter-spacing="-6">1977</text>
  <!-- Label -->
  <text x="24" y="30" font-family="'IBM Plex Sans', sans-serif" font-size="10" font-weight="600"
        fill="#15B5FF" fill-opacity="0.45" letter-spacing="2.5">PC ERA · PLACEHOLDER</text>
  <!-- Headline -->
  <text x="24" y="130" font-family="'IBM Plex Sans', sans-serif" font-size="26" font-weight="300"
        fill="#ffffff" fill-opacity="0.8">First GUIs</text>
  <!-- Subline -->
  <text x="24" y="156" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="400"
        fill="#ffffff" fill-opacity="0.28">Green Screen Terminal Era</text>
</svg>
