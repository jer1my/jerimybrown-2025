<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="270" fill="#0e0e0e" rx="8"/>
  <!-- Subtle horizontal lines suggesting a text interface -->
  <rect x="24" y="90" width="220" height="2" fill="#ea580c" fill-opacity="0.12" rx="1"/>
  <rect x="24" y="104" width="180" height="2" fill="#ea580c" fill-opacity="0.08" rx="1"/>
  <rect x="24" y="118" width="200" height="2" fill="#ea580c" fill-opacity="0.08" rx="1"/>
  <rect x="24" y="132" width="140" height="2" fill="#ea580c" fill-opacity="0.06" rx="1"/>
  <!-- Cursor blink rectangle -->
  <rect x="24" y="170" width="10" height="18" fill="#ea580c" fill-opacity="0.35" rx="1"/>
  <!-- Era accent bar -->
  <rect x="0" y="263" width="480" height="3" fill="#ea580c" rx="0" fill-opacity="0.6"/>
  <!-- Ghost year -->
  <text x="20" y="230" font-family="'IBM Plex Sans', sans-serif" font-size="128" font-weight="700"
        fill="#ea580c" fill-opacity="0.05" letter-spacing="-6">2022</text>
  <!-- Label -->
  <text x="24" y="30" font-family="'IBM Plex Sans', sans-serif" font-size="10" font-weight="600"
        fill="#ea580c" fill-opacity="0.45" letter-spacing="2.5">AI ERA · PLACEHOLDER</text>
  <!-- Headline -->
  <text x="24" y="65" font-family="'IBM Plex Sans', sans-serif" font-size="26" font-weight="300"
        fill="#ffffff" fill-opacity="0.8">ChatGPT Launches</text>
  <!-- Subline -->
  <text x="24" y="220" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="400"
        fill="#ffffff" fill-opacity="0.28">A Blank Text Box. 1M Users in 5 Days.</text>
</svg>
