<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="270" fill="#0e0e0e" rx="8"/>
  <!-- Grid pattern -->
  <line x1="80" y1="0" x2="80" y2="270" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="270" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="270" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="270" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="270" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="67.5" x2="480" y2="67.5" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="135" x2="480" y2="135" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="202.5" x2="480" y2="202.5" stroke="#15B5FF" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Era accent bar -->
  <rect x="0" y="263" width="480" height="3" fill="#15B5FF" rx="0" fill-opacity="0.6"/>
  <!-- UI Moment accent -->
  <rect x="0" y="0" width="3" height="270" fill="#c9a227" rx="0" fill-opacity="0.8"/>
  <!-- Ghost year -->
  <text x="20" y="230" font-family="'IBM Plex Sans', sans-serif" font-size="128" font-weight="700"
        fill="#15B5FF" fill-opacity="0.05" letter-spacing="-6">1984</text>
  <!-- Label -->
  <text x="32" y="30" font-family="'IBM Plex Sans', sans-serif" font-size="10" font-weight="600"
        fill="#c9a227" fill-opacity="0.7" letter-spacing="2.5">✦ UI MOMENT · PLACEHOLDER</text>
  <!-- Headline -->
  <text x="32" y="130" font-family="'IBM Plex Sans', sans-serif" font-size="26" font-weight="300"
        fill="#ffffff" fill-opacity="0.8">Macintosh Launches</text>
  <!-- Subline -->
  <text x="32" y="156" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="400"
        fill="#ffffff" fill-opacity="0.28">The Desktop Metaphor Goes Mainstream</text>
</svg>
