<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="270" fill="#0e0e0e" rx="8"/>
  <!-- Diagonal lines suggesting forward motion -->
  <line x1="320" y1="0" x2="480" y2="160" stroke="#ea580c" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="360" y1="0" x2="480" y2="120" stroke="#ea580c" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="480" y2="80" stroke="#ea580c" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="440" y1="0" x2="480" y2="40" stroke="#ea580c" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Era accent bar -->
  <rect x="0" y="263" width="480" height="3" fill="#ea580c" rx="0" fill-opacity="0.6"/>
  <!-- Ghost year -->
  <text x="20" y="230" font-family="'IBM Plex Sans', sans-serif" font-size="128" font-weight="700"
        fill="#ea580c" fill-opacity="0.05" letter-spacing="-6">2026</text>
  <!-- Label -->
  <text x="24" y="30" font-family="'IBM Plex Sans', sans-serif" font-size="10" font-weight="600"
        fill="#ea580c" fill-opacity="0.45" letter-spacing="2.5">AI ERA · PLACEHOLDER</text>
  <!-- Headline -->
  <text x="24" y="130" font-family="'IBM Plex Sans', sans-serif" font-size="26" font-weight="300"
        fill="#ffffff" fill-opacity="0.8">Claude Design Launches</text>
  <!-- Subline -->
  <text x="24" y="156" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="400"
        fill="#ffffff" fill-opacity="0.28">April 17, 2026 — The Pattern Completes</text>
</svg>
